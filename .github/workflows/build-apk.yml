name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Set Android version
        run: |
          sed -i 's/versionCode 1/versionCode ${{ github.run_number }}/' android/app/build.gradle

      # Configure kiosk-friendly Android settings
      - name: Patch AndroidManifest for kiosk mode
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Keep screen on, fullscreen, portrait
          sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="portrait"/' $MANIFEST || true
          sed -i 's/<activity/<activity android:screenOrientation="portrait" android:keepScreenOn="true"/' $MANIFEST || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadline-signs-timeclock-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ APK built successfully — size: $SIZE"
          fi
