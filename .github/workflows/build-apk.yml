name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Bump version code
        run: |
          sed -i 's/versionCode 1/versionCode ${{ github.run_number }}/' android/app/build.gradle

      - name: Patch AndroidManifest (Python)
        run: |
          python3 << 'EOF'
          import re
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          if 'android.permission.CAMERA' not in content:
              content = content.replace(
                  '<application',
                  '    <uses-permission android:name="android.permission.CAMERA" />\n'
                  '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
                  '    <application',
                  1
              )
              print('Camera permission added')
          content = re.sub(
              r'(<activity[^>]*android:name="[^"]*MainActivity[^"]*")',
              r'\1\n            android:screenOrientation="sensorLandscape"\n            android:keepScreenOn="true"',
              content
          )
          with open(path, 'w') as f:
              f.write(content)
          print('Manifest patched OK')
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadline-signs-timeclock-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Verify APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "✅ APK built — $(du -sh $APK | cut -f1)"
          else
            echo "❌ APK not found"; exit 1
          fi
