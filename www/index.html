<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Time Clock — Deadline Signs</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --surface:#141720; --surface2:#1c2030; --border:#252a3a;
  --green:#00e87a; --green-dim:rgba(0,232,122,0.12);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.12);
  --red:#ff4d6a;   --red-dim:rgba(255,77,106,0.12);
  --blue:#4d9eff;  --blue-dim:rgba(77,158,255,0.12);
  --text:#e8ecf4;  --muted:#5a6072; --muted2:#3a3f52;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;width:100%;overflow:hidden;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);user-select:none;-webkit-user-select:none;display:flex;flex-direction:column;}

/* HEADER */
.header{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:16px;padding:11px 22px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:32px;height:32px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--bg);}
.brand-name{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;line-height:1.2;}
.brand-sub{color:var(--muted);font-size:0.58rem;font-weight:400;letter-spacing:0.08em;}
.clock-display{text-align:center;}
.clock-time{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:0.05em;color:var(--text);line-height:1;}
.clock-date{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.sync-wrap{display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:background 0.3s;}
.sync-dot.syncing{background:var(--amber);animation:pulse 0.8s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-label{font-size:0.6rem;color:var(--muted);}
.btn-admin{padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;}
.btn-admin:hover{color:var(--text);border-color:var(--muted2);}

/* LANDSCAPE LAYOUT */
.main{flex:1;min-height:0;display:grid;grid-template-columns:1fr 360px;}

/* LEFT */
.left-panel{padding:18px 18px 18px 22px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.section-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--muted);margin-bottom:12px;}
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-content:start;}

/* EMPLOYEE CARDS */
.emp-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px 12px 14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;text-align:center;display:flex;flex-direction:column;align-items:center;}
.emp-card-bar{position:absolute;top:0;left:0;right:0;height:4px;background:var(--border);border-radius:14px 14px 0 0;transition:background 0.15s;}
.emp-card:hover{transform:translateY(-1px);}
.emp-card.status-in{border-color:rgba(0,232,122,0.45);background:var(--green-dim);}
.emp-card.status-in .emp-card-bar{background:var(--green);}
.emp-card.status-break{border-color:rgba(245,166,35,0.45);background:var(--amber-dim);}
.emp-card.status-break .emp-card-bar{background:var(--amber);}
.emp-card.status-install{border-color:rgba(77,158,255,0.45);background:var(--blue-dim);}
.emp-card.status-install .emp-card-bar{background:var(--blue);}

.emp-avatar{width:54px;height:54px;border-radius:50%;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;background:var(--surface2);color:var(--muted);border:2px solid var(--border);overflow:hidden;flex-shrink:0;}
.emp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.emp-card.status-in .emp-avatar{background:var(--green-dim);color:var(--green);border-color:rgba(0,232,122,0.35);}
.emp-card.status-break .emp-avatar{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,0.35);}
.emp-card.status-install .emp-avatar{background:var(--blue-dim);color:var(--blue);border-color:rgba(77,158,255,0.35);}

.emp-name{font-size:1rem;font-weight:700;margin-bottom:5px;}
.emp-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:3px 9px;border-radius:20px;}
.badge-in{background:var(--green-dim);color:var(--green);}
.badge-break{background:var(--amber-dim);color:var(--amber);}
.badge-install{background:var(--blue-dim);color:var(--blue);}
.badge-out{background:var(--surface2);color:var(--muted);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.dot.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.emp-time{font-size:0.65rem;color:var(--muted);margin-top:5px;}
.emp-tap{margin-top:10px;padding:8px 0;border-radius:8px;width:100%;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);background:var(--surface2);border:1px solid var(--border);}
.emp-card.status-out .emp-tap{border-color:rgba(0,232,122,0.3);color:var(--green);background:var(--green-dim);}
.emp-card.status-in .emp-tap{border-color:rgba(255,77,106,0.3);color:var(--red);background:var(--red-dim);}
.emp-card.status-break .emp-tap,.emp-card.status-install .emp-tap{border-color:rgba(0,232,122,0.3);color:var(--green);background:var(--green-dim);}

/* RIGHT */
.right-panel{display:flex;flex-direction:column;}
.action-panel{flex:1;padding:18px 20px;display:flex;flex-direction:column;min-height:0;}

/* LOG */
.log-wrap{flex:1;overflow-y:auto;min-height:0;}
.log-wrap::-webkit-scrollbar{width:4px;}
.log-wrap::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);font-size:0.72rem;}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-name{font-weight:700;}
.log-type{color:var(--muted);margin-left:4px;}
.log-time{margin-left:auto;color:var(--muted);font-size:0.64rem;flex-shrink:0;}
.log-photo{width:26px;height:26px;border-radius:5px;object-fit:cover;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}

/* ACTION SHEET */
.punch-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0;}
.punch-who{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.05em;}
.btn-x{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.btn-x:hover{color:var(--text);}
.action-btns{display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center;}
.abtn{display:flex;align-items:center;gap:16px;padding:16px 14px;border-radius:14px;cursor:pointer;border:2px solid;transition:opacity 0.15s;}
.abtn:active{opacity:0.8;}
.abtn-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.abtn-icon svg{width:22px;height:22px;}
.abtn-title{font-size:0.95rem;font-weight:700;display:block;margin-bottom:2px;}
.abtn-sub{font-size:0.7rem;opacity:0.7;}
.abtn-in{background:var(--green-dim);border-color:rgba(0,232,122,0.4);}
.abtn-in .abtn-icon{background:rgba(0,232,122,0.2);}
.abtn-in .abtn-title,.abtn-in .abtn-sub{color:var(--green);}
.abtn-break{background:var(--amber-dim);border-color:rgba(245,166,35,0.4);}
.abtn-break .abtn-icon{background:rgba(245,166,35,0.2);}
.abtn-break .abtn-title,.abtn-break .abtn-sub{color:var(--amber);}
.abtn-install{background:var(--blue-dim);border-color:rgba(77,158,255,0.4);}
.abtn-install .abtn-icon{background:rgba(77,158,255,0.2);}
.abtn-install .abtn-title,.abtn-install .abtn-sub{color:var(--blue);}
.abtn-out{background:var(--red-dim);border-color:rgba(255,77,106,0.4);}
.abtn-out .abtn-icon{background:rgba(255,77,106,0.2);}
.abtn-out .abtn-title,.abtn-out .abtn-sub{color:var(--red);}

/* CAMERA */
.cam-wrap-outer{flex:1;min-height:0;position:relative;border-radius:12px;overflow:hidden;background:#000;}
.cam-wrap-outer video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-wrap-outer canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.cam-countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:6rem;color:#fff;text-shadow:0 0 30px rgba(0,0,0,0.8);pointer-events:none;}
.cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.1s;}
.cam-flash.flash{opacity:1;}
.photo-prev-wrap{flex:1;min-height:0;border-radius:12px;overflow:hidden;}
.photo-prev-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.cam-footer{display:flex;flex-direction:column;gap:8px;flex-shrink:0;margin-top:10px;}
.btn-confirm{padding:15px;border-radius:12px;border:none;background:var(--green);color:var(--bg);font-family:'Sora',sans-serif;font-size:0.88rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;}
.btn-confirm:hover{opacity:0.9;}
.btn-retake{padding:11px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Sora',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px;width:420px;max-width:90vw;position:relative;transform:translateY(8px);transition:transform 0.2s;max-height:85vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.06em;margin-bottom:4px;}
.modal-sub{font-size:0.72rem;color:var(--muted);margin-bottom:18px;}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text);}

/* PIN */
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:background 0.15s;}
.pin-dot.filled{background:var(--green);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.pin-key{padding:15px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.5rem;cursor:pointer;text-align:center;transition:all 0.1s;}
.pin-key:hover{background:var(--border);}
.pin-key:active{transform:scale(0.95);}

/* ADMIN */
.admin-tabs{display:flex;gap:4px;margin-bottom:18px;}
.admin-tab{padding:7px 14px;border-radius:7px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;transition:all 0.15s;background:transparent;border:1px solid var(--border);color:var(--muted);}
.admin-tab.active{background:var(--surface2);color:var(--text);border-color:var(--muted2);}
.admin-pane{display:none;}
.admin-pane.active{display:block;}
.punch-table{width:100%;border-collapse:collapse;font-size:0.7rem;}
.punch-table th{text-align:left;padding:7px 9px;color:var(--muted);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;font-size:0.6rem;border-bottom:1px solid var(--border);}
.punch-table td{padding:7px 9px;border-bottom:1px solid rgba(37,42,58,0.5);}
.punch-edit-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.6rem;cursor:pointer;}
.punch-edit-btn:hover{color:var(--text);}
.settings-field{margin-bottom:14px;}
.settings-label{font-size:0.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;}
.settings-input{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:0.76rem;}
.settings-input:focus{outline:none;border-color:var(--muted2);}
.toggle-switch{width:38px;height:20px;border-radius:10px;background:var(--muted2);position:relative;cursor:pointer;transition:background 0.2s;border:none;flex-shrink:0;}
.toggle-switch.on{background:var(--green);}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left 0.2s;}
.toggle-switch.on::after{left:21px;}
.btn{padding:10px 18px;border-radius:9px;font-family:'Sora',sans-serif;font-size:0.76rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;transition:all 0.15s;border:none;width:100%;}
.btn-primary{background:var(--green);color:var(--bg);}
.btn-primary:hover{opacity:0.9;}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,0.3);margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:0.76rem;font-weight:600;z-index:9999;opacity:0;transition:all 0.2s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.green{border-color:rgba(0,232,122,0.4);color:var(--green);}
.toast.red{border-color:rgba(255,77,106,0.4);color:var(--red);}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-mark">DS</div>
    <div><div class="brand-name">Deadline Signs</div><div class="brand-sub">Time Clock</div></div>
  </div>
  <div class="clock-display">
    <div class="clock-time" id="clockTime">--:--</div>
    <div class="clock-date" id="clockDate">---</div>
  </div>
  <div class="sync-wrap">
    <span class="sync-dot" id="syncDot"></span>
    <span class="sync-label" id="syncLabel">Not configured</span>
  </div>
  <button class="btn-admin" onclick="openAdmin()">⚙ Admin</button>
</div>

<div class="main">
  <div class="left-panel">
    <div class="section-label">Tap your name to punch</div>
    <div class="emp-grid" id="empGrid"></div>
  </div>

  <div class="right-panel">
    <div class="action-panel">

      <!-- IDLE LOG -->
      <div id="stateIdle" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="section-label">Today's activity</div>
        <div class="log-wrap" id="logScroll"></div>
      </div>

      <!-- ACTION SHEET -->
      <div id="stateAction" class="hidden" style="display:flex;flex-direction:column;flex:1;">
        <div class="punch-hdr">
          <div class="punch-who" id="actionName"></div>
          <button class="btn-x" onclick="cancelPunch()">✕</button>
        </div>
        <div class="action-btns" id="actionBtns"></div>
      </div>

      <!-- CAMERA -->
      <div id="stateCam" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="punch-hdr" style="flex-shrink:0;">
          <div class="punch-who" id="camTitle" style="font-size:1.3rem;"></div>
          <button class="btn-x" onclick="cancelPunch()">✕</button>
        </div>
        <div class="cam-wrap-outer">
          <video id="camVideo" autoplay playsinline></video>
          <canvas id="camCanvas" style="display:none;"></canvas>
          <div class="cam-countdown hidden" id="camCountdown"></div>
          <div class="cam-flash" id="camFlash"></div>
        </div>
        <div class="cam-footer">
          <button class="btn-confirm" onclick="startCapture()">📷 Take Photo &amp; Confirm</button>
        </div>
      </div>

      <!-- PHOTO CONFIRM -->
      <div id="statePhoto" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="punch-hdr" style="flex-shrink:0;">
          <div class="punch-who" id="photoTitle" style="font-size:1.3rem;"></div>
          <button class="btn-x" onclick="cancelPunch()">✕</button>
        </div>
        <div class="photo-prev-wrap">
          <img id="photoPreview" src="" alt="">
        </div>
        <div class="cam-footer">
          <button class="btn-confirm" onclick="confirmPunch()">✓ Confirm Punch</button>
          <button class="btn-retake" onclick="retakePhoto()">↩ Retake</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ADMIN PIN -->
<div class="overlay" id="adminPinOverlay">
  <div class="modal" style="width:300px;">
    <button class="modal-close" onclick="closeModal('adminPinOverlay')">✕</button>
    <h2>Admin</h2>
    <div class="modal-sub">Enter PIN</div>
    <div class="pin-display">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('del')" style="font-size:0.9rem;font-family:'Sora',sans-serif;">⌫</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key" onclick="pinPress('ok')" style="font-size:0.75rem;font-family:'Sora',sans-serif;">OK</button>
    </div>
    <p id="pinError" style="color:var(--red);font-size:0.7rem;text-align:center;margin-top:10px;min-height:16px;"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="adminOverlay">
  <div class="modal" style="width:640px;">
    <button class="modal-close" onclick="closeModal('adminOverlay')">✕</button>
    <h2>Admin Panel</h2>
    <div class="modal-sub">Punches, employees, settings</div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('log')">Punch Log</button>
      <button class="admin-tab" onclick="switchTab('employees')">Employees</button>
      <button class="admin-tab" onclick="switchTab('settings')">Settings</button>
    </div>
    <div class="admin-pane active" id="tab-log">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:0.7rem;color:var(--muted);">Today</span>
        <button class="btn-admin" onclick="exportCSV()">↓ Export CSV</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="punch-table">
          <thead><tr><th>Employee</th><th>Type</th><th>Time</th><th>Photo</th><th>Sync</th><th></th></tr></thead>
          <tbody id="adminPunchBody"></tbody>
        </table>
      </div>
    </div>
    <div class="admin-pane" id="tab-employees">
      <div id="empList"></div>
      <hr style="border-color:var(--border);margin:14px 0;">
      <div class="settings-label">Add Employee</div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;">
        <input class="settings-input" id="newEmpName" placeholder="Name">
        <button class="btn btn-primary" style="width:auto;padding:9px 18px;" onclick="addEmployee()">+ Add</button>
      </div>
    </div>
    <div class="admin-pane" id="tab-settings">
      <div class="settings-field">
        <div class="settings-label">Google Sheets Web App URL</div>
        <input class="settings-input" id="sheetsUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <div class="settings-field">
        <div class="settings-label">Admin PIN (4 digits)</div>
        <input class="settings-input" id="newPin" type="password" placeholder="Leave blank to keep current">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>

<!-- EDIT PUNCH -->
<div class="overlay" id="editPunchOverlay">
  <div class="modal" style="width:340px;">
    <button class="modal-close" onclick="closeModal('editPunchOverlay')">✕</button>
    <h2>Edit Punch</h2>
    <div class="settings-field">
      <div class="settings-label">Employee</div>
      <input class="settings-input" id="editEmp" readonly>
    </div>
    <div class="settings-field">
      <div class="settings-label">Type</div>
      <select class="settings-input" id="editType" style="cursor:pointer;">
        <option value="clock_in">Clock In</option>
        <option value="break_start">Break Start</option>
        <option value="break_end">Break End</option>
        <option value="install_start">Go on Install</option>
        <option value="install_end">Back from Install</option>
        <option value="clock_out">Clock Out</option>
      </select>
    </div>
    <div class="settings-field">
      <div class="settings-label">Time</div>
      <input class="settings-input" id="editTime" type="datetime-local">
    </div>
    <button class="btn btn-primary" onclick="saveEditPunch()">Save Changes</button>
    <button class="btn btn-red" onclick="deletePunch()">Delete Punch</button>
  </div>
</div>

<div class="overlay" id="photoLightbox" onclick="closeModal('photoLightbox')">
  <img id="lightboxImg" style="max-width:80vw;max-height:80vh;border-radius:12px;border:1px solid var(--border);">
</div>

<div class="toast" id="toast"></div>

<script>
let employees=JSON.parse(localStorage.getItem('tc_employees')||'null')||
  [{name:'Megan',installEnabled:false},{name:'Carlie',installEnabled:false},{name:'Noah',installEnabled:true}];
let punches=JSON.parse(localStorage.getItem('tc_punches')||'[]');
let settings=JSON.parse(localStorage.getItem('tc_settings')||'{"pin":"1234","sheetsUrl":""}');
let pinBuffer='',activeEmployee=null,selectedType=null,capturedPhoto=null,capturedThumb=null,editingPunchId=null,camStream=null;

if(employees.length&&typeof employees[0]==='string')
  employees=employees.map(n=>({name:n,installEnabled:n==='Noah'}));

function tickClock(){
  const n=new Date();
  document.getElementById('clockTime').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clockDate').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
setInterval(tickClock,1000);tickClock();

function save(){
  localStorage.setItem('tc_employees',JSON.stringify(employees));
  localStorage.setItem('tc_punches',JSON.stringify(punches));
  localStorage.setItem('tc_settings',JSON.stringify(settings));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}

function todayPunches(name){
  const t=new Date().toDateString();
  return punches.filter(p=>p.emp===name&&new Date(p.ts).toDateString()===t);
}

function getStatus(name){
  const tp=todayPunches(name).sort((a,b)=>a.ts-b.ts);
  if(!tp.length)return'out';
  const last=tp[tp.length-1].type;
  if(last==='clock_in'||last==='break_end'||last==='install_end')return'in';
  if(last==='break_start')return'break';
  if(last==='install_start')return'install';
  return'out';
}

function totalHourly(name){
  const tp=todayPunches(name).sort((a,b)=>a.ts-b.ts);
  let total=0,ci=null;
  for(const p of tp){
    if(p.type==='clock_in'||p.type==='break_end'||p.type==='install_end')ci=p.ts;
    if((p.type==='clock_out'||p.type==='break_start'||p.type==='install_start')&&ci){total+=p.ts-ci;ci=null;}
  }
  if(ci)total+=Date.now()-ci;
  const h=Math.floor(total/3600000),m=Math.floor((total%3600000)/60000);
  return h?`${h}h ${m}m`:`${m}m`;
}

function punchLabel(t){
  return{clock_in:'Clocked In',clock_out:'Clocked Out',break_start:'Break',break_end:'Back from Break',
    install_start:'On Install',install_end:'Back from Install'}[t]||t;
}
function typeColor(t){
  if(t==='clock_in'||t==='break_end'||t==='install_end')return'var(--green)';
  if(t==='clock_out')return'var(--red)';
  if(t==='break_start')return'var(--amber)';
  if(t==='install_start')return'var(--blue)';
  return'var(--muted)';
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'),2800);
}

function showState(name){
  const states=['stateIdle','stateAction','stateCam','statePhoto'];
  states.forEach(id=>{
    const el=document.getElementById(id);
    if(id===name){el.classList.remove('hidden');el.style.display='flex';}
    else{el.classList.add('hidden');el.style.display='none';}
  });
}

function renderGrid(){
  const g=document.getElementById('empGrid');g.innerHTML='';
  employees.forEach(emp=>{
    const s=getStatus(emp.name),init=emp.name.substring(0,2).toUpperCase();
    const tp=todayPunches(emp.name).sort((a,b)=>a.ts-b.ts);
    const lastP=tp[tp.length-1],total=tp.length?totalHourly(emp.name):'';
    let badge='';
    if(s==='in')badge=`<span class="emp-badge badge-in"><span class="dot pulse"></span>Clocked In</span>`;
    else if(s==='break')badge=`<span class="emp-badge badge-break"><span class="dot pulse"></span>On Break</span>`;
    else if(s==='install')badge=`<span class="emp-badge badge-install"><span class="dot pulse"></span>On Install</span>`;
    else badge=`<span class="emp-badge badge-out"><span class="dot"></span>Off Clock</span>`;
    let tap='Clock In';
    if(s==='in')tap='Punch';
    if(s==='break')tap='End Break';
    if(s==='install')tap='Back / Clock Out';
    const av=lastP?.photo?`<img src="${lastP.photo}" alt="">`:`<span>${init}</span>`;
    g.innerHTML+=`<div class="emp-card status-${s}" onclick="openPunch('${emp.name}')">
      <div class="emp-card-bar"></div>
      <div class="emp-avatar">${av}</div>
      <div class="emp-name">${emp.name}</div>
      ${badge}
      ${total?`<div class="emp-time">${total} today</div>`:''}
      <div class="emp-tap">${tap}</div>
    </div>`;
  });
}

function renderLog(){
  const today=new Date().toDateString();
  const rows=punches.filter(p=>new Date(p.ts).toDateString()===today).sort((a,b)=>b.ts-a.ts).slice(0,40);
  const s=document.getElementById('logScroll');
  if(!rows.length){s.innerHTML=`<div style="color:var(--muted);font-size:0.72rem;padding:12px;">No punches today.</div>`;return;}
  s.innerHTML=rows.map(p=>`<div class="log-entry">
    <div class="log-dot" style="background:${typeColor(p.type)};"></div>
    <div><span class="log-name">${p.emp}</span><span class="log-type">${punchLabel(p.type)}</span></div>
    <div class="log-time">${fmtTime(p.ts)}</div>
    ${p.photo?`<img class="log-photo" src="${p.photo}" onclick="openLightbox('${p.id}')">`:''}
  </div>`).join('');
}

function render(){renderGrid();renderLog();}

function openPunch(name){
  activeEmployee=name;selectedType=null;
  const emp=employees.find(e=>e.name===name);
  const s=getStatus(name);
  document.getElementById('actionName').textContent=name;
  const btns=document.getElementById('actionBtns');btns.innerHTML='';
  const opts=[];
  if(s==='out') opts.push({type:'clock_in',label:'Clock In',sub:'Start hourly tracking',cls:'abtn-in'});
  if(s==='in')  opts.push({type:'break_start',label:'Start Break',sub:'Pauses hourly clock',cls:'abtn-break'});
  if(s==='in'&&emp?.installEnabled) opts.push({type:'install_start',label:'Go on Install',sub:'Flat fee \u2014 not tracked hourly',cls:'abtn-install'});
  if(s==='in')  opts.push({type:'clock_out',label:'Clock Out',sub:'End shift',cls:'abtn-out'});
  if(s==='break') opts.push({type:'break_end',label:'End Break',sub:'Resume hourly',cls:'abtn-in'});
  if(s==='break') opts.push({type:'clock_out',label:'Clock Out',sub:'End shift',cls:'abtn-out'});
  if(s==='install') opts.push({type:'install_end',label:'Back from Install',sub:'Resume hourly tracking',cls:'abtn-in'});
  if(s==='install') opts.push({type:'clock_out',label:'Clock Out',sub:'End shift',cls:'abtn-out'});
  opts.forEach(o=>{
    const el=document.createElement('div');
    el.className=`abtn ${o.cls}`;
    el.innerHTML=`<div class="abtn-icon">${getIcon(o.type)}</div><div><span class="abtn-title">${o.label}</span><span class="abtn-sub">${o.sub}</span></div>`;
    el.onclick=()=>{selectedType=o.type;openCamera();};
    btns.appendChild(el);
  });
  showState('stateAction');
}

function getIcon(t){
  const i={
    clock_in:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    clock_out:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`,
    break_start:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
    break_end:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    install_start:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="10" width="22" height="8" rx="2"/><path d="M5 10V7a2 2 0 012-2h10a2 2 0 012 2v3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>`,
    install_end:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  };
  return i[t]||i.clock_in;
}

function openCamera(){
  document.getElementById('camTitle').textContent=`${activeEmployee} \u2014 ${punchLabel(selectedType)}`;
  showState('stateCam');startCamera();
}

function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720}})
    .then(stream=>{camStream=stream;document.getElementById('camVideo').srcObject=stream;})
    .catch(()=>confirmPunchNoPhoto());
}

function stopCamera(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}}

function startCapture(){
  let count=3;
  const cd=document.getElementById('camCountdown');
  cd.classList.remove('hidden');cd.textContent=count;
  const iv=setInterval(()=>{
    count--;
    if(count>0){cd.textContent=count;}
    else{clearInterval(iv);cd.classList.add('hidden');takeSnapshot();}
  },1000);
}

function takeSnapshot() {
  const v=document.getElementById('camVideo'),c=document.getElementById('camCanvas');
  // Resize to max 800px wide to keep base64 size manageable
  const maxW=800;
  const scale=Math.min(1, maxW/(v.videoWidth||640));
  c.width  = Math.round((v.videoWidth||640)*scale);
  c.height = Math.round((v.videoHeight||480)*scale);
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  // Full quality for upload (0.6)
  capturedPhoto=c.toDataURL('image/jpeg',0.6);

  // Thumbnail for local display only (200px wide, very small)
  const tc=document.createElement('canvas');
  const ts2=Math.min(1,200/c.width);
  tc.width=Math.round(c.width*ts2); tc.height=Math.round(c.height*ts2);
  tc.getContext('2d').drawImage(c,0,0,tc.width,tc.height);
  capturedThumb=tc.toDataURL('image/jpeg',0.4);

  const f=document.getElementById('camFlash');f.classList.add('flash');setTimeout(()=>f.classList.remove('flash'),150);
  document.getElementById('photoPreview').src=capturedPhoto;
  document.getElementById('photoTitle').textContent=`${activeEmployee} \u2014 ${punchLabel(selectedType)}`;
  showState('statePhoto');stopCamera();
}

function retakePhoto(){capturedPhoto=null;showState('stateCam');startCamera();}
function confirmPunchNoPhoto(){capturedPhoto=null;recordPunch();}
function confirmPunch(){recordPunch();}

function recordPunch(){
  // Store thumbnail only in localStorage (keeps storage small)
  // Full photo is sent to Drive via syncPunch
  const p={id:uid(),emp:activeEmployee,type:selectedType,ts:Date.now(),photo:capturedThumb||null,photoFull:capturedPhoto||null,synced:false};
  punches.push(p);save();showState('stateIdle');stopCamera();render();
  showToast(`${activeEmployee} \u2014 ${punchLabel(selectedType)}`,'green');
  syncPunch(p);
  // Clear full photo from memory after kicking off sync
  capturedPhoto=null;capturedThumb=null;
}

function cancelPunch(){stopCamera();selectedType=activeEmployee=capturedPhoto=null;showState('stateIdle');}

async function syncPunch(p){
  if(!settings.sheetsUrl){updateSyncUI('err','No URL');return;}
  updateSyncUI('syncing','Syncing\u2026');
  try{
    const payload={
      id:p.id, employee:p.emp, type:p.type, typeLabel:punchLabel(p.type),
      readableTime:new Date(p.ts).toLocaleString(),
      timestamp:new Date(p.ts).toISOString(),
      photoTaken:p.photoFull||p.photo?'Yes':'No',
      photoBase64:p.photoFull||''  // full quality for Drive upload
    };
    // No Content-Type header = text/plain = no CORS preflight needed
    const res=await fetch(settings.sheetsUrl,{method:'POST',redirect:'follow',body:JSON.stringify(payload)});
    const d=await res.json();
    if(d.success){
      p.synced=true;
      if(d.photoUrl) p.photoUrl=d.photoUrl;
      p.photoFull=null; // clear full photo from memory now that it's in Drive
      save();
      updateSyncUI('ok','Synced');
    } else throw new Error(d.error||'Script error');
  }catch(err){
    updateSyncUI('err','Sync failed');
    console.error('Sync error:',err);
  }
}

function updateSyncUI(s,l){
  document.getElementById('syncDot').className=`sync-dot ${s}`;
  document.getElementById('syncLabel').textContent=l;
}

function openAdmin(){openModal('adminPinOverlay');pinBuffer='';updatePinDisplay();}

function pinPress(k){
  if(k==='del'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(k==='ok'){checkPin();return;}
  else{if(pinBuffer.length<4)pinBuffer+=k;}
  updatePinDisplay();
  if(pinBuffer.length===4)setTimeout(checkPin,100);
}

function checkPin(){
  if(pinBuffer===settings.pin){closeModal('adminPinOverlay');pinBuffer='';updatePinDisplay();openAdminPanel();}
  else{document.getElementById('pinError').textContent='Incorrect PIN';pinBuffer='';updatePinDisplay();}
}

function updatePinDisplay(){
  for(let i=0;i<4;i++)document.getElementById(`pd${i}`).classList.toggle('filled',i<pinBuffer.length);
  if(!pinBuffer.length)document.getElementById('pinError').textContent='';
}

function openAdminPanel(){
  renderAdminLog();renderAdminEmployees();
  document.getElementById('sheetsUrl').value=settings.sheetsUrl||'';
  document.getElementById('newPin').value='';
  openModal('adminOverlay');
}

function switchTab(n){
  const tabs=['log','employees','settings'];
  document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===n));
  document.querySelectorAll('.admin-pane').forEach(p=>p.classList.toggle('active',p.id===`tab-${n}`));
  if(n==='log')renderAdminLog();
  if(n==='employees')renderAdminEmployees();
}

function renderAdminLog(){
  const today=new Date().toDateString();
  const rows=punches.filter(p=>new Date(p.ts).toDateString()===today).sort((a,b)=>b.ts-a.ts);
  const tb=document.getElementById('adminPunchBody');
  tb.innerHTML=rows.map(p=>`<tr>
    <td>${p.emp}</td>
    <td style="color:${typeColor(p.type)}">${punchLabel(p.type)}</td>
    <td>${fmtTime(p.ts)}</td>
    <td>${p.photo?`<img style="width:24px;height:24px;border-radius:4px;object-fit:cover;cursor:pointer;border:1px solid var(--border);" src="${p.photo}" onclick="openLightbox('${p.id}')">`:'—'}</td>
    <td style="color:${p.synced?'var(--green)':'var(--amber)'}">${p.synced?'✓':'Pending'}</td>
    <td><button class="punch-edit-btn" onclick="openEditPunch('${p.id}')">Edit</button></td>
  </tr>`).join('');
  if(!rows.length)tb.innerHTML='<tr><td colspan="6" style="color:var(--muted);padding:14px;">No punches today</td></tr>';
}

function renderAdminEmployees(){
  document.getElementById('empList').innerHTML=employees.map((e,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:9px;margin-bottom:7px;gap:12px;">
      <span style="font-weight:700;font-size:0.88rem;">${e.name}</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:0.68rem;color:var(--muted);">Install punch</span>
        <button class="toggle-switch ${e.installEnabled?'on':''}" onclick="toggleInstall(${i})"></button>
        <button class="punch-edit-btn" style="color:var(--red);" onclick="removeEmployee(${i})">Remove</button>
      </div>
    </div>`).join('');
}

function toggleInstall(i){employees[i].installEnabled=!employees[i].installEnabled;save();renderAdminEmployees();render();}

function addEmployee(){
  const n=document.getElementById('newEmpName').value.trim();if(!n)return;
  employees.push({name:n,installEnabled:false});save();
  document.getElementById('newEmpName').value='';
  renderAdminEmployees();render();showToast(`${n} added`,'green');
}

function removeEmployee(i){
  if(!confirm(`Remove ${employees[i].name}?`))return;
  employees.splice(i,1);save();renderAdminEmployees();render();
}

function saveSettings(){
  settings.sheetsUrl=document.getElementById('sheetsUrl').value.trim();
  const np=document.getElementById('newPin').value.trim();
  if(np&&np.length===4&&/^\d+$/.test(np))settings.pin=np;
  save();showToast('Settings saved','green');
  if(settings.sheetsUrl)updateSyncUI('ok','Configured');
}

function openEditPunch(id){
  editingPunchId=id;const p=punches.find(x=>x.id===id);if(!p)return;
  document.getElementById('editEmp').value=p.emp;
  document.getElementById('editType').value=p.type;
  const d=new Date(p.ts);
  document.getElementById('editTime').value=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  openModal('editPunchOverlay');
}

function saveEditPunch(){
  const p=punches.find(x=>x.id===editingPunchId);if(!p)return;
  p.type=document.getElementById('editType').value;
  p.ts=new Date(document.getElementById('editTime').value).getTime();
  p.synced=false;save();closeModal('editPunchOverlay');renderAdminLog();render();
  showToast('Punch updated','green');
}

function deletePunch(){
  if(!confirm('Delete this punch?'))return;
  punches=punches.filter(x=>x.id!==editingPunchId);
  save();closeModal('editPunchOverlay');renderAdminLog();render();
  showToast('Punch deleted');
}

function exportCSV(){
  const rows=[['ID','Employee','Type','Time','Timestamp','Photo','Synced']];
  punches.sort((a,b)=>a.ts-b.ts).forEach(p=>{
    rows.push([p.id,p.emp,punchLabel(p.type),fmtTime(p.ts),new Date(p.ts).toISOString(),p.photo?'Yes':'No',p.synced?'Yes':'No']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`timeclock-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function openLightbox(id){
  const p=punches.find(x=>x.id===id);if(!p||!p.photo)return;
  document.getElementById('lightboxImg').src=p.photo;openModal('photoLightbox');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function init(){
  render();
  if(settings.sheetsUrl)updateSyncUI('ok','Configured');
  setInterval(()=>{if(employees.some(e=>['in','break','install'].includes(getStatus(e.name))))renderGrid();},60000);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
